name: test
on:
  merge_group:
  pull_request:
  push:

# env:
#   RUST_BACKTRACE: 1

jobs:
  rust_doc_test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-22.04-arm
          # - freebsd-latest # self-hosted
        rust:
          - '1.88' # msrv
          - stable
          - beta
          - nightly
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: install_rust
        uses: ./.github/actions/setup-rust
        with:
          channel: ${{ matrix.rust }}
          default: false
      - name: Install dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt update
          sudo apt install -y fuse3 libfuse3-dev
      - name: Install dependencies
        if: startsWith(matrix.os, 'freebsd')
        run: |
          sudo pkg install -y pkgconf fusefs-libs3
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: target
          key: ${{ matrix.os }}-rust-${{ steps.install_rust.outputs.version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-rust-${{ steps.install_rust.outputs.version }}
      - name: Run test
        run: cargo +${{ matrix.rust }} test --locked --release
      - name: Install portable-network-archive from crates.io
        uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3.4.0
        with:
          crate: portable-network-archive
          cache-key: ${{ matrix.os }}
      - name: Install cli
        run: |
          cargo +${{ matrix.rust }} install --locked --path .
      - name: Run test cli
        shell: bash
        run: |
          chmod +x -R scripts/tests
          ./scripts/tests/run.sh
      - name: Upload proptest regressions on failure
        # `cargo test` runs `roundtrip_proptest::save_load_roundtrip_*`
        # at its in-tree default (64 cases). A new counter-example
        # appended to proptest-regressions/ would otherwise vanish with
        # the runner — preserve it so the seed can be replayed and
        # committed back. Per-matrix entry name keeps the 8 parallel
        # runs from clobbering each other.
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: proptest-regressions-${{ matrix.os }}-${{ matrix.rust }}
          path: proptest-regressions/
          if-no-files-found: ignore

  posix_conformance:
    # POSIX conformance via pjdfstest. Architectural failures (special-file
    # types not representable in PNA, hardlinks, privileged-only tests) are
    # listed under `expected_failures` in scripts/tests/pjdfstest.toml; any
    # other regression breaks this job. Update the expected_failures list
    # deliberately when a feature lands or a real bug is fixed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: install_rust
        uses: ./.github/actions/setup-rust
        with:
          channel: stable
          default: false
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y fuse3 libfuse3-dev libacl1-dev acl
          # The harness mounts pnafs with --allow-other so pjdfstest's
          # seteuid()-to-nobody/tests/pjdfstest tests can reach the FS;
          # FUSE rejects --allow-other from non-root users unless
          # `user_allow_other` is set in /etc/fuse.conf. The runner is
          # ephemeral, so toggling it here is safe.
          echo user_allow_other | sudo tee -a /etc/fuse.conf
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: target
          key: ${{ runner.os }}-pjdfstest-rust-${{ steps.install_rust.outputs.version }}-${{ hashFiles('**/Cargo.lock', 'scripts/tests/test_pjdfstest.sh') }}
          restore-keys: |
            ${{ runner.os }}-pjdfstest-rust-${{ steps.install_rust.outputs.version }}
      - name: Install portable-network-archive from crates.io
        uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3.4.0
        with:
          crate: portable-network-archive
          cache-key: pjdfstest-${{ runner.os }}
      - name: Install pnafs
        run: cargo +stable install --locked --path .
      - name: Run pjdfstest
        # The runner is ephemeral, so let the harness auto-create the
        # dummy users pjdfstest needs (nobody / tests / pjdfstest). The
        # script refuses to touch /etc/passwd unless this flag is set.
        env:
          PJDFSTEST_CREATE_USERS: "1"
        shell: bash
        run: |
          chmod +x scripts/tests/test_pjdfstest.sh
          ./scripts/tests/test_pjdfstest.sh

  fsx:
    # Random read / write / truncate / mmap I/O against a pnafs --write
    # mount via the Rust port of fsx. Reproducible: any failure prints
    # the seed and a per-op log so the same sequence can be replayed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: install_rust
        uses: ./.github/actions/setup-rust
        with:
          channel: stable
          default: false
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y fuse3 libfuse3-dev
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: target
          key: ${{ runner.os }}-fsx-rust-${{ steps.install_rust.outputs.version }}-${{ hashFiles('**/Cargo.lock', 'scripts/tests/test_fsx.sh') }}
          restore-keys: |
            ${{ runner.os }}-fsx-rust-${{ steps.install_rust.outputs.version }}
      - name: Install portable-network-archive from crates.io
        uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3.4.0
        with:
          crate: portable-network-archive
          cache-key: fsx-${{ runner.os }}
      - name: Install pnafs
        run: cargo +stable install --locked --path .
      - name: Run fsx
        # Surface the seed + op log out of the test workdir so a failed
        # run is reproducible from the artifact.
        env:
          FSX_ARTIFACTS_OUT: ${{ github.workspace }}/fsx-artifacts
        shell: bash
        run: |
          chmod +x scripts/tests/test_fsx.sh
          ./scripts/tests/test_fsx.sh
      - name: Upload fsx artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fsx-artifacts
          path: ${{ github.workspace }}/fsx-artifacts
          if-no-files-found: ignore

  fsstress:
    # Multi-process stress: N workers issue random FS ops (mkdir, unlink,
    # rename, write, truncate, ...) against a shared subtree. Targets the
    # RwLock<FileTree> contention and (nlink, open_count) orphan paths
    # that single-threaded suites can't trigger.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: install_rust
        uses: ./.github/actions/setup-rust
        with:
          channel: stable
          default: false
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y fuse3 libfuse3-dev
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: target
          key: ${{ runner.os }}-fsstress-rust-${{ steps.install_rust.outputs.version }}-${{ hashFiles('**/Cargo.lock', 'scripts/tests/test_fsstress.sh') }}
          restore-keys: |
            ${{ runner.os }}-fsstress-rust-${{ steps.install_rust.outputs.version }}
      - name: Install portable-network-archive from crates.io
        uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3.4.0
        with:
          crate: portable-network-archive
          cache-key: fsstress-${{ runner.os }}
      - name: Install pnafs
        run: cargo +stable install --locked --path .
      - name: Run fsstress
        shell: bash
        run: |
          chmod +x scripts/tests/test_fsstress.sh
          ./scripts/tests/test_fsstress.sh
