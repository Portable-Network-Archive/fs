name: proptest
on:
  schedule:
    # 06:00 UTC daily — broad sweep without blocking push latency.
    - cron: '0 6 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      # Anything that changes archive serialisation, the FileTree, or the
      # property test itself can shift the search space, so re-sweep
      # eagerly on PRs that touch these files.
      - 'src/archive_io.rs'
      - 'src/file_tree.rs'
      - 'src/roundtrip_proptest.rs'
      - 'proptest-regressions/**'
      - '.github/workflows/proptest.yml'

permissions:
  contents: read

jobs:
  extended_sweep:
    runs-on: ubuntu-latest
    env:
      # Default in-tree cap is 64 (fast enough for `cargo test` locally).
      # Widen here to push past the easy seeds the per-push CI run
      # already covers. Encrypted properties use Argon2id, so going
      # much higher than this on the runner pushes total wall time
      # past the hour mark — bump deliberately.
      PROPTEST_CASES: 10000
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: install_rust
        uses: ./.github/actions/setup-rust
        with:
          channel: stable
          default: false
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y fuse3 libfuse3-dev
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target
          key: ${{ runner.os }}-proptest-rust-${{ steps.install_rust.outputs.version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-proptest-rust-${{ steps.install_rust.outputs.version }}
      - name: Run extended proptest sweep
        # Defer the filter and runtime knobs to scripts/tests/proptest_sweep.sh
        # so a developer running the same sweep locally hits exactly
        # the same set of properties. Otherwise it is easy for the
        # two paths to drift — Phase 4 renamed properties and the
        # workflow's hardcoded filter silently picked nothing up.
        run: |
          chmod +x scripts/tests/proptest_sweep.sh
          ./scripts/tests/proptest_sweep.sh -- --nocapture
      - name: Upload proptest regressions on failure
        # On failure, proptest appends the shrunk seed for any new
        # counter-example to `proptest-regressions/`. Hoist the file out
        # of the runner FS so it survives — committing it back into the
        # repo is what makes the case re-run on every future push.
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: proptest-regressions
          path: proptest-regressions/
          if-no-files-found: warn
